name: 香港自动预测

on:
  schedule:
    # 香港六合彩通常每周二、四、六晚开奖，可在开奖后次日凌晨运行
    # 这里设置为每天 UTC 20:00（北京时间凌晨4:00）
    - cron: '0 20 * * *'
  workflow_dispatch:   # 允许手动触发

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install pandas lightgbm xgboost optuna numpy
          # 若有外部模块文件，此处无需额外安装

      - name: 运行预测与同步
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python macau_predict.py sync --with-backtest
          python macau_predict.py show
