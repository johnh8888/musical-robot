name: 新澳门六合彩预测

on:
  schedule:
    - cron: '0 15 * * *'   # 北京时间 23:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 同步数据
        run: python macau_predict.py sync --year 2026
      
      - name: 生成预测
        run: python macau_predict.py predict
      
      - name: 显示推荐
        run: python macau_predict.py show
