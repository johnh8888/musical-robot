name: 澳门个人每日预测
on:
  schedule:
    - cron: '0 7 * * *'      # 每天 UTC 7:00 (北京时间 15:00)
  workflow_dispatch:          # 支持手动触发

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 缓存数据库
        uses: actions/cache@v3
        with:
          path: macau_gentle.db
          key: macau-gentle-db
          restore-keys: |
            macau-gentle-db

      - name: 同步历史数据（自动重试，CSV备用）
        run: python macau_predict.py sync

      - name: 生成下期预测
        run: python macau_predict.py predict

      - name: 显示最终推荐
        run: python macau_predict.py show

      - name: 上传预测报告
        uses: actions/upload-artifact@v4
        with:
          name: macau-prediction
          path: macau_gentle.db
        if: always()
