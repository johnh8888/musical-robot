name: 澳门六合彩预测

on:
  schedule:
    # 每天 UTC 15:00 执行 (北京时间晚上 23:00)
    - cron: '0 15 * * *'
  workflow_dispatch:  # 允许手动触发测试

jobs:
  run-predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

            - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 执行预测脚本
        run: python macau_predict.py auto
