name: 香港0.2版本自动更新与推送

on:
  schedule:
    # 香港开奖时间一般为每天 21:30（香港时间），此处设为每天 14:00 UTC（即 22:00 北京时间）
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  update-predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install lightgbm scikit-learn numpy

      - name: 配置 PushPlus Token
        run: echo "PUSHPLUS_TOKEN=${{ secrets.PUSHPLUS_TOKEN }}" >> $GITHUB_ENV

      - name: 初始化数据库（如果不存在）
        run: |
          if [ ! -f "macau_predict.db" ]; then
            python macau_predict.py bootstrap
          fi

      - name: 同步最新开奖并生成预测
        run: |
          python macau_predict.py sync

      - name: 显示结果并推送微信
        run: |
          python macau_predict.py show

      - name: 上传数据库（可选，用于备份）
        uses: actions/upload-artifact@v4
        with:
          name: macau-predict-db
          path: macau_predict.db
          retention-days: 7
