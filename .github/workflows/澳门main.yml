name: 新澳门六合彩每日预测

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 缓存数据库
        uses: actions/cache@v3
        with:
          path: macau_fixed.db
          key: macau-fixed-db
      - name: 同步数据
        run: python macau_fixed.py sync
      - name: 生成预测
        run: python macau_fixed.py predict
      - name: 显示推荐
        run: python macau_fixed.py show
