name: 自动搜索最佳窗口组合

on:
  workflow_dispatch:   # 手动触发

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行搜索脚本
        run: python search_best_windows.py > windows_result.txt

      - name: 提取最佳窗口
        id: extract
        run: |
          BEST_WINDOWS=$(grep "建议将" windows_result.txt | sed -n 's/.*= //p' | tr -d '[]')
          echo "best_windows=$BEST_WINDOWS" >> $GITHUB_OUTPUT

      - name: 修改 zodiac_main.py
        run: |
          sed -i "s/OPTIMAL_WINDOWS = .*/OPTIMAL_WINDOWS = [${{ steps.extract.outputs.best_windows }}]/" zodiac_main.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zodiac_main.py
          git commit -m "Auto-update best windows from search" || echo "No changes"
          git push || echo "Push failed"

      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: optimization-log
          path: windows_result.txt