name: 香港六合彩预测 (机器学习版)

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install xgboost lightgbm scikit-learn pandas numpy

      - name: 训练机器学习模型（若模型文件不存在）
        run: |
          if [ ! -f "zodiac_ranker.txt" ] || [ ! -f "special_xgb.json" ]; then
            python train_ml_models.py
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add zodiac_ranker.txt special_xgb.json
            git commit -m "Auto-train ML models (LightGBM + XGBoost)" || echo "No changes"
            git push || echo "Push failed"
          else
            echo "机器学习模型已存在，跳过训练"
          fi

      - name: 生肖预测（机器学习版）
        run: python zodiac_main_ml.py --show

      - name: 特别号预测（机器学习版）
        run: python special_only_ml.py --show

      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: prediction-logs
          path: |
            *.txt