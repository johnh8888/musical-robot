name: 自动搜索最佳窗口组合

on:
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行搜索脚本
        run: python search_best_windows.py > windows_result.txt

      - name: 提取最佳窗口并更新 zodiac_main.py
        run: |
          python - <<EOF
          import re
          with open('windows_result.txt', 'r') as f:
              content = f.read()
          # 查找 "建议将 `OPTIMAL_WINDOWS = [ ... ]` 应用到"
          match = re.search(r'OPTIMAL_WINDOWS = \[([^\]]+)\]', content)
          if match:
              windows_str = match.group(1)
              windows = [int(x.strip()) for x in windows_str.split(',')]
              # 读取 zodiac_main.py
              with open('zodiac_main.py', 'r') as f:
                  lines = f.readlines()
              # 修改 OPTIMAL_WINDOWS 行
              for i, line in enumerate(lines):
                  if line.strip().startswith('OPTIMAL_WINDOWS ='):
                      lines[i] = f'OPTIMAL_WINDOWS = {windows}\n'
                      break
              with open('zodiac_main.py', 'w') as f:
                  f.writelines(lines)
              print(f"已将 OPTIMAL_WINDOWS 更新为 {windows}")
          else:
              print("未找到最佳窗口，请手动检查 windows_result.txt")
          EOF

      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zodiac_main.py
          git commit -m "Auto-update best windows from search" || echo "No changes"
          git push || echo "Push failed"

      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: optimization-log
          path: windows_result.txt