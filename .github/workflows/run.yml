name: 香港六合彩预测 (最终增强版)

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 生肖预测
        run: python zodiac_main.py --show

      - name: 特别号预测
        run: python special_only.py --show

      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: prediction-logs
          path: |
            *.txt