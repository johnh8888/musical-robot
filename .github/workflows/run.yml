name: 自动调参特二色

on:
  workflow_dispatch:

jobs:
  tune:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: 运行调参脚本
        run: python auto_tune_color_two.py
      - name: 更新 color_two.py
        run: |
          python <<'EOF'
          import json
          with open('best_color_config.json') as f:
              cfg = json.load(f)
          windows = cfg['windows']
          weights = cfg['window_weights']
          miss_factor = cfg['miss_factor']
          with open('color_two.py', 'r') as f:
              lines = f.readlines()
          new_lines = []
          for line in lines:
              if line.strip().startswith('windows ='):
                  new_lines.append(f"windows = {windows}\n")
              elif line.strip().startswith('window_weights ='):
                  new_lines.append(f"window_weights = {weights}\n")
              elif line.strip().startswith('miss_factor ='):
                  new_lines.append(f"miss_factor = {miss_factor}\n")
              else:
                  new_lines.append(line)
          with open('color_two.py', 'w') as f:
              f.writelines(new_lines)
          print("已更新 color_two.py")
          EOF
      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add color_two.py best_color_config.json
          git commit -m "Auto-tune color two parameters" || echo "No changes"
          git push || echo "Push failed"
      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: tuning-result
          path: best_color_config.json