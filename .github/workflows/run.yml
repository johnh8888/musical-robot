name: 香港六合彩预测 (自动优化版)

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install optuna

      - name: 参数优化（若 best_params.json 不存在）
        run: |
          if [ ! -f "best_params.json" ]; then
            python optimize_windows.py
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add best_params.json
            git commit -m "Initial parameter optimization" || echo "No changes"
            git push || echo "Push failed"
          else
            echo "best_params.json 已存在，跳过优化"
          fi

      - name: 生肖预测（使用最佳参数）
        run: python zodiac_main.py --show

      - name: 特别号预测
        run: python special_only.py --show

      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: prediction-logs
          path: |
            *.txt