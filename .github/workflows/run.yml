name: 自动搜索波色最佳窗口

on:
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: pip install -r requirements.txt
      - name: 运行搜索脚本
        run: python search_color_windows.py
      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: color-window-search-result
          path: |
            *.txt