name: 香港六合彩预测 (机器学习版)

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install xgboost lightgbm scikit-learn pandas numpy
      - name: 训练模型（若不存在）
        run: |
          if [ ! -f "xgboost_zodiac_3.json" ] || [ ! -f "lgb_special_ranker.txt" ]; then
            python train_ml_zodiac.py
            python train_ml_special.py
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add xgboost_zodiac_3.json lgb_special_ranker.txt
            git commit -m "Train ML models" || echo "No changes"
            git push || echo "Push failed"
          else
            echo "模型已存在"
          fi
      - name: 一二三生肖预测（机器学习融合）
        run: python zodiac_main_ml.py --show
      - name: 特五肖预测（机器学习）
        run: python special_only_ml.py --show
      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: prediction-logs
          path: |
            *.txt