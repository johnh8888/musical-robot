name: 香港六合彩特二色预测（双注模式）

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: 特二色预测（双注）
        run: python color_two.py --show
      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: color-two-prediction-logs
          path: |
            *.txt